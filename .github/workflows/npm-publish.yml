# Publish @blamejs/pki to the npm registry on every `v*` tag push, AND
# create the signed GitHub release with the full asset bundle.
#
# The workflow is authoritative for release creation — the operator
# pushes the tag and the workflow:
#   1. Validates (version/tag match + eslint + smoke + SBOM + OSV scan)
#   2. Packs the tarball (the exact bytes that will be published)
#   3. Generates SLSA L3 provenance via slsa-github-generator (produces a
#      *.intoto.jsonl attestation linked to this exact workflow run +
#      commit + tag, signed via Sigstore-keyless)
#   4. Cosign-signs the SBOM (Sigstore-keyless via the workflow's OIDC
#      token)
#   5. Extracts release notes from the CHANGELOG.md entry for this version
#   6. Creates the GitHub release ATOMICALLY with the full asset bundle:
#        - blamejs-pki-X.Y.Z.tgz  (+ .sha256 sidecar)
#        - sbom.cdx.json (+ sbom.cdx.json.sigstore)
#        - blamejs-pki-X.Y.Z.intoto.jsonl (SLSA L3 provenance)
#   7. Publishes to npm with --provenance attached.
#
# Supply-chain posture:
#   - npm publish --provenance attaches a SLSA v1 provenance attestation
#     tying the published tarball to this workflow run + commit + tag.
#   - The GitHub release carries the same SLSA attestation as
#     `*.intoto.jsonl`. Operators verify via `slsa-verifier
#     verify-artifact <tarball> --provenance-path <jsonl> --source-uri
#     github.com/<repo> --source-tag vX.Y.Z`.
#   - The SBOM carries an independent cosign-keyless signature.
#   - Version match: package.json "version" MUST equal the pushed tag
#     minus the leading "v". Tag drift fails the publish.
#
# `workflow_dispatch.dry_run` exercises validate (eslint + smoke + pack)
# without provenance / cosign / release-creation / npm publish.

name: npm publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + lint + smoke without publishing to npm or creating the release'
        type: boolean
        default: true

# Workflow-level is read-only; downstream jobs elevate as needed
# (contents:write for the release, id-token:write for npm provenance +
# sigstore cosign + slsa-github-generator OIDC).
permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # eslint is a devDependency, lockfile-integrity-pinned and installed with
  # `npm ci` — no registry-resolved, unpinned code executes anywhere in the
  # pipeline. Defense in depth on top of the pin: nothing beyond the lockfile
  # set may execute in the workspace that packs the published bytes (a
  # compromised transitive there could rewrite lib/ before `npm pack`, and
  # the SLSA provenance would faithfully attest the tampered tarball), so
  # eslint still runs in its own job — a release gate (validate needs it)
  # whose compromise is confined to the lint verdict, never the tree the
  # pack + subject hashes are computed from.
  lint:
    name: ESLint (isolated from the pack workspace)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node 24.18.0 LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.18.0'

      - name: Install devDependencies (lockfile-pinned)
        run: npm ci --no-audit --no-fund

      - name: ESLint (max-warnings 0)
        run: npx --no-install eslint --max-warnings 0 .

  validate:
    name: Static gates, smoke, SBOM, pack
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_tag:  ${{ steps.version.outputs.is_tag }}
      hashes:  ${{ steps.subjects.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node 24.18.0 LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.18.0'

      - name: Compute version + is_tag flag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$EVENT_NAME" = "push" ] && [[ "$REF" == refs/tags/v* ]]; then
            TAG_VERSION="${REF#refs/tags/v}"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::package.json version ($PKG_VERSION) does not match pushed tag (v$TAG_VERSION)"
              exit 1
            fi
            echo "package.json version $PKG_VERSION matches pushed tag v$TAG_VERSION"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install devDependencies
        # Exact-version pinned via the committed lockfile — the publish
        # path builds with deterministic tool versions rather than
        # floating latest. The toolkit ships ZERO npm runtime deps;
        # devDependencies never reach the tarball per the `files`
        # allowlist in package.json.
        run: npm ci --no-audit --no-fund

      # The tag-push publish path is independent of the pull_request CI, so the
      # full static-gate battery re-runs here before `npm pack` — a tree that
      # fails any of these must never be packed into the published tarball.
      # (eslint re-runs too, in the isolated `lint` job this one needs.)
      - name: Codebase-patterns detectors
        run: node test/layer-0-primitives/codebase-patterns.test.js

      - name: Wiki @module / @primitive comment-block convention
        run: node scripts/validate-source-comment-blocks.js

      - name: API surface snapshot gate
        run: node scripts/check-api-snapshot.js

      - name: '@status lifecycle gate'
        run: node scripts/check-status-lifecycle.js

      - name: Lockfile / supply-chain pin currency
        run: node scripts/pin-all.js --check

      - name: Show Node + npm version
        run: |
          node --version
          npm --version

      - name: Run smoke
        env:
          SMOKE_PARALLEL: "8"
        run: node test/smoke.js

      - name: Generate CycloneDX SBOM (npm-tree)
        # `npm sbom` is built in to npm 10+. `--omit=dev` keeps the
        # devDependencies installed for the smoke gate out of the runtime
        # component list, then the guard below refuses the publish if any
        # runtime dep snuck in — the zero-dep contract says lib/vendor/
        # holds everything.
        run: |
          set -euo pipefail
          npm sbom --sbom-format=cyclonedx --sbom-type=application --omit=dev > sbom.cdx.json
          RUNTIME_DEPS=$(node -e "
            var s = JSON.parse(require('fs').readFileSync('sbom.cdx.json', 'utf8'));
            var comps = (s.components || []).filter(function (c) {
              return c.scope !== 'optional' && c.scope !== 'excluded' &&
                     c['bom-ref'] !== s.metadata.component['bom-ref'];
            });
            console.log(comps.length);
          ")
          if [ "$RUNTIME_DEPS" -gt 0 ]; then
            echo "::error::SBOM lists $RUNTIME_DEPS runtime dependency component(s)."
            echo "::error::@blamejs/pki ships zero npm runtime deps — vendor any new dep into lib/vendor/."
            exit 1
          fi

      - name: Detect vendored bundles
        # lib/vendor/ holds only its manifest and README until a vendored
        # bundle lands, and OSV-Scanner warns (rather than no-ops) when a
        # directory target contains nothing scannable. Gate the directory
        # scan on real vendored content so the scan is exact in both
        # states — never silenced with --allow-no-lockfiles, which would
        # also mute a future misconfigured scan.
        id: vendor
        run: |
          set -euo pipefail
          COUNT=$(find lib/vendor -type f ! -name 'MANIFEST.json' ! -name 'README.md' | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Vulnerability scan (OSV-Scanner)
        # The published tarball ships zero runtime dependencies (the gate
        # above refuses the publish otherwise), so its SBOM is empty by
        # construction and gives the scanner nothing to read — the scannable
        # dependency surface is the dev/build toolchain the committed
        # lockfiles pin, which is exactly the supply chain that runs during
        # this publish.
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --lockfile=package-lock.json
            --lockfile=fuzz/package-lock.json

      - name: Vulnerability scan (OSV-Scanner, vendored bundles)
        # lib/vendor/ is the bundled-but-not-in-SBOM surface — vendored
        # deps don't appear in `npm sbom` because they're CommonJS
        # bundles, not npm deps.
        if: steps.vendor.outputs.present == 'true'
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            -r lib/vendor/

      - name: Pack tarball (the exact bytes that will be published)
        # Reproducible build: `npm pack` stamps a fixed, hardcoded mtime
        # into every tar header (pacote's tar-create-options pins it to
        # 1985-10-26T08:15:00Z), so re-packing the same commit is
        # byte-identical and an operator can rebuild the tarball from
        # source and match the published sha256. npm does not consult
        # SOURCE_DATE_EPOCH — no timestamp export is needed here.
        run: |
          set -euo pipefail
          mkdir -p dist
          npm pack --pack-destination ./dist
          ls -lh dist/

      - name: Compute SLSA subjects (base64-encoded sha256 of every release artifact)
        # SLSA "subjects" = the artifacts the attestation describes: the
        # tarball + the SBOM. The cosign sigstore bundle is itself a
        # signature over the SBOM — it is NOT a meaningful SLSA subject
        # (signing a signature is a category error). The reusable workflow
        # expects a single base64-w0 line of `<sha256>  <filename>`
        # newline-separated entries.
        id: subjects
        run: |
          set -euo pipefail
          TARBALL=$(basename "$(find dist -maxdepth 1 -name '*.tgz' | head -1)")
          HASHES=$(
            (cd dist && sha256sum "$TARBALL") && \
            sha256sum sbom.cdx.json
          )
          echo "[slsa-subjects] subjects:"
          echo "$HASHES"
          HASHES_B64=$(echo "$HASHES" | base64 -w0)
          echo "hashes=$HASHES_B64" >> "$GITHUB_OUTPUT"

      - name: Upload publish bundle (tarball + SBOM + CHANGELOG)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: publish-bundle
          path: |
            dist/*.tgz
            sbom.cdx.json
            package.json
            CHANGELOG.md
          if-no-files-found: error
          retention-days: 1

  # Generate the SLSA L3 provenance attestation for the tarball + SBOM.
  # Runs only on real tag pushes (not on dry-run / branch pushes) since
  # the attestation binds to the workflow_ref + tag-ref pair.
  #
  # upload-assets: false — the reusable workflow normally uploads the
  # *.intoto.jsonl directly to the GH release. We do NOT want that,
  # because (a) the release doesn't exist yet at this point in the
  # pipeline (publish-and-release creates it), and (b) all assets are
  # attached atomically at release-create time so the immutable-release
  # setting can stay on. upload-assets: false produces the attestation as
  # a workflow artifact we download in publish-and-release.
  provenance:
    needs: validate
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.validate.outputs.is_tag == 'true' && !inputs.dry_run }}
    # `contents: write` is demanded by the called workflow, not used here:
    # GitHub validates every nested job's requested permissions against the
    # caller's grant when the reusable workflow is resolved — including the
    # generator's upload-assets job, which declares contents:write and is
    # merely `if:`-skipped by `upload-assets: false`. Withholding the grant
    # startup-fails the whole call. The generator downgrades to
    # contents:read in every job that actually runs.
    permissions:
      id-token: write    # OIDC token for Sigstore-keyless signing
      contents: write    # statically required by the generator's (skipped) upload-assets job
      actions: read      # introspect this workflow run for the attestation
    # IMPORTANT: Tag-pinned, NOT SHA-pinned. SLSA's internal builder-fetch
    # step expects `BUILDER_REF` in `refs/tags/vX.Y.Z` form and refuses a
    # 40-hex SHA. The .pinact.yaml `ignore_actions` entry exempts this
    # single call from SHA-pinning; upstream tag-protection + immutable
    # releases mitigate.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0  # zizmor: ignore[unpinned-uses] allow:slsa-framework-action-not-sha-pinned — SLSA's internal builder-fetch refuses non-tag refs; mitigated by slsa-framework's upstream tag-protection + immutable-release rules
    with:
      base64-subjects:    "${{ needs.validate.outputs.hashes }}"
      upload-assets:      false
      provenance-name:    "blamejs-pki-${{ needs.validate.outputs.version }}.intoto.jsonl"
      # SLSA's privacy detection can report a public repo as "private" in
      # this context and halt to avoid leaking the repo name in Sigstore's
      # public transparency log. The repo is public; the transparency-log
      # entry is the desired behavior. `private-repository: true` overrides
      # the detection.
      private-repository: true
      # The SLSA workflow's `final` job ANDs every nested job's outcome —
      # including the `upload-assets` job we intentionally skip via
      # `upload-assets: false`. An empty outcome evaluates false in the AND
      # chain and the workflow exits nonzero even though the generator job
      # created the provenance artifact successfully.
      # `continue-on-error: true` reports success regardless of that
      # computation. It also masks a REAL internal generator failure, so
      # publish-and-release never trusts this job's verdict: it re-hashes
      # the downloaded artifacts against the attested subjects and runs
      # slsa-verifier on the attestation before anything is published — a
      # generator failure (or missing artifact) fails the publish there.
      continue-on-error: true

  publish-and-release:
    name: Cosign sign + create release + publish to npm
    needs: [validate, provenance]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.validate.outputs.is_tag == 'true' && !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write    # gh release create + asset attach
      id-token: write    # OIDC token for npm provenance + sigstore cosign
    timeout-minutes: 15
    steps:
      - name: Set up Node 24.18.0 LTS + npm registry auth
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.18.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Download publish bundle (tarball + SBOM + CHANGELOG)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: publish-bundle

      - name: Download SLSA provenance artifact
        # slsa-github-generator publishes the attestation as a workflow
        # artifact whose name matches `provenance-name`.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: blamejs-pki-${{ needs.validate.outputs.version }}.intoto.jsonl

      - name: Verify downloaded artifacts against the attested subject hashes
        # The publish bundle travels through the actions artifact store
        # between jobs. Recompute the sha256 of the tarball + SBOM with the
        # exact commands the validate job used to derive the SLSA subjects
        # and require byte-identical output — a divergence means the bytes
        # about to be published are NOT the bytes the provenance attests,
        # and the publish must not proceed. (The .sha256 release sidecar is
        # derived from the downloaded tarball further down; this check is
        # what entitles it to be.)
        env:
          HASHES_B64: ${{ needs.validate.outputs.hashes }}
        run: |
          set -euo pipefail
          EXPECTED=$(echo "$HASHES_B64" | base64 -d)
          TARBALL=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          ACTUAL=$(
            (cd dist && sha256sum "$(basename "$TARBALL")") && \
            sha256sum sbom.cdx.json
          )
          if [ -z "$EXPECTED" ] || [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Downloaded artifacts do not match the SLSA subject hashes the validate job computed."
            echo "attested subjects:"
            echo "$EXPECTED"
            echo "downloaded artifacts:"
            echo "$ACTUAL"
            exit 1
          fi
          echo "[subject-verify] tarball + SBOM match the attested subject hashes"

      - name: Install slsa-verifier (release binary + sha256 verify)
        # Exact version + inline expected sha256 (from SHA256SUM.md in the
        # slsa-verifier repository), mirroring the zizmor install pattern:
        # a rewritten upstream release fails closed instead of executing on
        # the publish path.
        env:
          SLSA_VERIFIER_VERSION: v2.7.1
          SLSA_VERIFIER_SHA256:  946dbec729094195e88ef78e1734324a27869f03e2c6bd2f61cbc06bd5350339
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/slsa-verifier "https://github.com/slsa-framework/slsa-verifier/releases/download/${SLSA_VERIFIER_VERSION}/slsa-verifier-linux-amd64"
          ACTUAL=$(sha256sum /tmp/slsa-verifier | awk '{print $1}')
          if [ "$ACTUAL" != "$SLSA_VERIFIER_SHA256" ]; then
            echo "::error::slsa-verifier sha256 ${ACTUAL} does not match pinned ${SLSA_VERIFIER_SHA256}"
            exit 1
          fi
          sudo install -m 0755 /tmp/slsa-verifier /usr/local/bin/slsa-verifier
          slsa-verifier version

      - name: Verify the SLSA provenance against the artifacts it attests
        # The provenance job's verdict is untrustworthy by construction
        # (its `continue-on-error: true` input reports success even when
        # the generator fails internally), so the attestation is proven
        # here instead: slsa-verifier checks the Sigstore signature, the
        # source-repo + tag binding, and that every artifact digest appears
        # in the attested subjects. A release never ships an attestation
        # that does not verify against its own assets.
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          TARBALL=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          slsa-verifier verify-artifact "$TARBALL" sbom.cdx.json \
            --provenance-path "blamejs-pki-${VERSION}.intoto.jsonl" \
            --source-uri "github.com/${GITHUB_REPOSITORY}" \
            --source-tag "v${VERSION}"
          echo "[slsa-verify] provenance verifies against the tarball + SBOM"

      - name: Verify NPM_TOKEN is reachable
        # Fail loud + early if the NPM_TOKEN secret isn't visible to this
        # workflow run. The publish step otherwise produces an opaque
        # ENEEDAUTH after ~60s of npm registry churn.
        env:
          NPM_TOKEN_REACHABLE: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          if [ "$NPM_TOKEN_REACHABLE" != "true" ]; then
            echo "::error::NPM_TOKEN secret is empty in this workflow run."
            echo "::error::Confirm a secret named NPM_TOKEN exists in the npm-publish environment"
            echo "::error::and that the environment's deployment-branch policy includes this tag."
            exit 1
          fi
          echo "NPM_TOKEN secret is reachable."

      - name: Install cosign (sigstore-keyless)
        # Sigstore keyless signing — the workflow's OIDC token is exchanged
        # with Sigstore's Fulcio for a short-lived cert bound to the
        # workflow identity, then cosign signs the SBOM. Verifiers reach
        # for the Rekor transparency-log entry.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Cosign sign-blob SBOM
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle sbom.cdx.json.sigstore \
            sbom.cdx.json
          echo "[cosign-sbom] signed sbom.cdx.json; bundle at sbom.cdx.json.sigstore"

      - name: Release-digest sidecar (SHA-256)
        # Conventional checksum operators expect on a release page; verify
        # with `sha256sum -c`. Written in `<sha>  <filename>` format.
        run: |
          set -euo pipefail
          TARBALL=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          ( cd "$(dirname "$TARBALL")" && sha256sum "$(basename "$TARBALL")" > "$(basename "$TARBALL").sha256" )
          cat "${TARBALL}.sha256"

      - name: Extract release notes from CHANGELOG
        # Single source of truth: the `## vX.Y.Z` section of CHANGELOG.md.
        # awk prints lines from the matching header up to (not including)
        # the next `## ` header.
        id: notes
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          awk -v ver="v${VERSION}" '
            $0 ~ "^## " ver "( |$|—)" { grab=1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          BYTE_COUNT=$(wc -c < release-notes.md | tr -d ' ')
          if [ "$BYTE_COUNT" -lt 16 ]; then
            echo "::error::Could not extract a CHANGELOG.md section for v${VERSION} (got ${BYTE_COUNT} bytes)."
            echo "::error::Confirm CHANGELOG.md has a '## v${VERSION}' header."
            exit 1
          fi
          echo "[release-notes] extracted ${BYTE_COUNT} bytes for v${VERSION}"

      - name: Create signed release with ALL assets atomically
        # The workflow is authoritative for release creation. We refuse to
        # overwrite an existing release — if one exists for this tag,
        # that's an integrity signal (a duplicate run, or a manual
        # create). Fail loud.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      v${{ needs.validate.outputs.version }}
          VERSION:  ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. The workflow is authoritative for release creation."
            echo "::error::Delete it with 'gh release delete $TAG' and re-run, OR push a new tag."
            exit 1
          fi
          TARBALL=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          ASSETS=(
            "$TARBALL"
            "${TARBALL}.sha256"
            sbom.cdx.json sbom.cdx.json.sigstore
            "blamejs-pki-${VERSION}.intoto.jsonl"
          )
          echo "[release-create] assets: $TARBALL + .sha256 + SBOM + cosign bundle + intoto.jsonl"
          gh release create "$TAG" \
            "${ASSETS[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file release-notes.md
          echo "[release-create] release $TAG created with full asset bundle"

      - name: Verify npm registry signing chain (npm audit signatures)
        # Verifies the cryptographic signing chain for every package in the
        # install tree. The toolkit ships zero npm runtime deps so the tree
        # is trivially empty today — the step is regression-defense: if a
        # future patch adds a runtime dep, this catches an unsigned
        # registry entry before publish. Invariant-driven (dep count),
        # not error-message-driven.
        run: |
          set +e
          RUNTIME_DEP_COUNT=$(node -e "console.log(Object.keys(require('./package.json').dependencies || {}).length)" 2>/dev/null || echo 0)
          if [ "$RUNTIME_DEP_COUNT" = "0" ]; then
            echo "[npm-audit-signatures] zero runtime dependencies — invariant holds; regression gate armed for the first dep added."
            exit 0
          fi
          OUT=$(npm audit signatures --omit dev 2>&1)
          STATUS=$?
          set -e
          echo "$OUT"
          if [ "$STATUS" -eq 0 ]; then
            echo "[npm-audit-signatures] registry signing chain verified for $RUNTIME_DEP_COUNT runtime dep(s)"
            exit 0
          fi
          echo "::error::npm audit signatures failed — runtime deps exist but couldn't be verified against the registry signing chain"
          exit "$STATUS"

      - name: Publish to npm (with SLSA provenance)
        # `npm publish <tarball>` publishes the EXACT bytes the validate
        # job packed (and OSV-scanned). Provenance is generated against
        # this workflow run's context. The leading `./` is load-bearing —
        # without it npm 10+ mis-classifies a relative path containing `/`
        # as a git spec.
        run: |
          set -euo pipefail
          TARBALL=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          echo "Publishing: $TARBALL"
          npm publish "./${TARBALL}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  summary:
    name: Build summary
    needs: [validate, provenance, publish-and-release]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Render outcome table
        env:
          IS_TAG:            ${{ needs.validate.outputs.is_tag || 'false' }}
          VERSION:           ${{ needs.validate.outputs.version || 'unknown' }}
          DRY_RUN:           ${{ inputs.dry_run || 'false' }}
          VALIDATE_RESULT:   ${{ needs.validate.result }}
          PROVENANCE_RESULT: ${{ needs.provenance.result }}
          PUBLISH_RESULT:    ${{ needs.publish-and-release.result }}
        run: |
          {
            echo "### npm publish"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Package**          | \`@blamejs/pki\` |"
            echo "| **Version**          | \`${VERSION}\` |"
            echo "| **Tag push**         | ${IS_TAG} |"
            echo "| **Dry run**          | ${DRY_RUN} |"
            echo "| **Validate job**     | ${VALIDATE_RESULT} |"
            echo "| **SLSA provenance**  | ${PROVENANCE_RESULT} |"
            echo "| **Publish + release**| ${PUBLISH_RESULT} |"
            echo "| **Registry**         | https://registry.npmjs.org |"
            if [ "$IS_TAG" = "true" ] && [ "$DRY_RUN" != "true" ] && [ "$PUBLISH_RESULT" = "success" ]; then
              echo "| **Provenance (npm)** | https://www.npmjs.com/package/@blamejs/pki/v/${VERSION} → Provenance tab |"
              echo "| **GitHub release**   | https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION} |"
            fi
            echo ""
            echo "Operators can install with:"
            echo ""
            echo '```bash'
            echo "npm install @blamejs/pki@${VERSION}"
            echo '```'
            if [ "$IS_TAG" = "true" ] && [ "$DRY_RUN" != "true" ] && [ "$PUBLISH_RESULT" = "success" ]; then
              echo ""
              echo "Verify SLSA provenance:"
              echo ""
              echo '```bash'
              echo "gh release download v${VERSION} --repo ${GITHUB_REPOSITORY}"
              echo "slsa-verifier verify-artifact blamejs-pki-${VERSION}.tgz \\"
              echo "  --provenance-path blamejs-pki-${VERSION}.intoto.jsonl \\"
              echo "  --source-uri github.com/${GITHUB_REPOSITORY} \\"
              echo "  --source-tag v${VERSION}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

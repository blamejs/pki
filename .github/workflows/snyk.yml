name: Snyk

# Snyk Open Source (SCA) + Code (SAST) as a third independent scanner alongside
# CodeQL and Semgrep. Requires the SNYK_TOKEN repository secret. Findings upload
# to the Security tab as SARIF (non-blocking) so a Snyk-only finding does not
# wedge the merge gate; CodeQL/Semgrep remain the SAST signal in review.
#
# Deliberately NOT run on pull_request: the job needs the SNYK_TOKEN secret, and
# a fork PR must never be able to reach it. Push-to-main + the weekly schedule
# give continuous coverage; the CodeQL/Semgrep/dependency-review gates run on PRs.
on:
  push:
    branches: [main]
  schedule:
    - cron: "43 5 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  snyk:
    name: Snyk (SCA + Code)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v5.0.0
        with:
          node-version: 24

      - name: Snyk Open Source (dependencies)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npx --yes snyk@latest test --all-projects --severity-threshold=high --sarif-file-output=snyk-oss.sarif || true

      - name: Upload Snyk SARIF to the Security tab
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: snyk-oss.sarif
          category: snyk

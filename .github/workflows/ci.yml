# Smoke + static gates + interop on every push/PR.
#
# Output posture: every step's full output is shown — no `>/dev/null`,
# no `--quiet`, no `--silent`. Operators reading a failed run see what
# actually fired without re-running locally.
#
# Every third-party action is SHA-pinned with a trailing version
# comment (the `.pinact.yaml` policy has no exception for this file, so
# no tag-shaped `uses:` reference is permitted here).

name: CI

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Workflow-level permissions are least-privilege (read-only). No job in
# this workflow writes back to the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node 24.18.0 LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.18.0'

      - name: Show Node + npm version
        run: node --version && npm --version

      - name: Install devDependencies
        # The toolkit ships ZERO npm runtime deps — everything is vendored
        # under lib/vendor/. devDependencies (esbuild) never reach the npm
        # tarball per the `files` allowlist in package.json. `npm ci`
        # installs exactly the committed lockfile with integrity hashes,
        # so OpenSSF Scorecard's Pinned-Dependencies query sees a pinned
        # install (it keys on the `ci` verb, not a name@version specifier).
        run: npm ci --no-audit --no-fund

      - name: Run smoke (under c8 coverage)
        env:
          SMOKE_PARALLEL: "4"
        run: npm run coverage

      - name: Execution-traced swallow gate
        # Every lib swallow (a catch that returns a value instead of re-throwing) MUST be
        # exercised by the suite -- c8 line coverage of the catch body is live proof it
        # runs fail-closed -- or carry an allow:swallow-unverified marker. Reads the lcov
        # the coverage step just wrote; no fail-open verify/parse slips through unverified.
        run: node scripts/check-swallow-coverage.js

  static-gates:
    name: Static gates (eslint + patterns + comment blocks + api snapshot)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node 24.18.0 LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.18.0'

      - name: Install devDependencies
        run: npm ci --no-audit --no-fund

      - name: ESLint (max-warnings 0)
        run: npx --no-install eslint --max-warnings 0 .

      - name: Codebase-patterns detectors
        # In-repo structural-drift + bug-class detectors. Walks the whole
        # lib/ + test/ corpus; fails on any un-allowlisted match.
        run: node test/layer-0-primitives/codebase-patterns.test.js

      - name: Wiki @module / @primitive comment-block convention
        # Source-driven wiki: every lib/ file carries an @module block and
        # every public function a @primitive block. Fast signal — no app
        # boot, just walks lib/ for the annotations.
        run: node scripts/validate-source-comment-blocks.js

      - name: API surface snapshot gate
        # Fails on breaking changes (removed methods, signature changes).
        # Additive changes are logged but pass — the baseline is refreshed
        # at the next release commit alongside the version bump.
        run: node scripts/check-api-snapshot.js

      - name: '@status lifecycle gate'
        # Drives experimental -> stable -> deprecated: fails when a primitive is
        # overdue for a graduation review (no dated keep-experimental decision in
        # lifecycle-reviews.json) or a deprecation has reached its remove-by.
        run: node scripts/check-status-lifecycle.js

      - name: Lockfile / supply-chain pin currency
        # The committed lockfiles must record the current package.json
        # version and pinned specs. A release that bumps package.json but
        # forgets `pin-all --lockfiles` shipped a stale lockfile before;
        # this gate makes that drift fail closed on every PR.
        run: node scripts/pin-all.js --check

  interop:
    name: Interop (cross-implementation, containerized)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node 24.18.0 LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.18.0'

      - name: Install devDependencies
        run: npm ci --no-audit --no-fund

      - name: Run interop tests (containerized OpenSSL/NSS oracle)
        # The interop service is a run-to-completion container bundling
        # Node + OpenSSL (+ NSS certutil); `run --rm` executes the
        # integration suite inside it and returns its exit code. This
        # cross-checks the structures the toolkit parses and emits against
        # an independent PKI implementation, pinned so CI and a developer
        # laptop verify against the same oracle.
        run: docker compose -f docker-compose.test.yml run --rm interop

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          # gitleaks scans full history on a non-shallow checkout, so an
          # accidentally-committed secret in any prior commit is caught
          # even if a later commit reverts it.
          fetch-depth: 0

      - name: Install gitleaks (release binary + sha256 verify)
        # Pull the OSS gitleaks binary directly from GitHub releases. The
        # `gitleaks/gitleaks-action` wrapper requires a commercial license
        # for organization accounts; the underlying binary is Apache-2.0
        # with no such requirement. Exact version + inline expected sha256
        # (the zizmor install pattern in actions-lint.yml): a checksums
        # file downloaded from the same release as the tarball can only
        # detect transport corruption — a compromised release ships
        # matching checksums — so the expected hash is pinned here where a
        # bump is reviewed before it can execute in CI. New detection
        # rules ride deliberate version bumps. Authenticate the github.com
        # download so the shared-runner-IP unauthenticated rate limit does
        # not 403 the install mid-run; curl drops the Authorization header
        # on the cross-host redirect to the release-asset CDN, so the
        # token is only sent to github.com.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256:  551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" -o "/tmp/${TARBALL}" "${BASE}/${TARBALL}"
          ACTUAL=$(sha256sum "/tmp/${TARBALL}" | awk '{print $1}')
          if [ "$ACTUAL" != "$GITLEAKS_SHA256" ]; then
            echo "::error::gitleaks tarball sha256 ${ACTUAL} does not match pinned ${GITLEAKS_SHA256}"
            exit 1
          fi
          tar -xzf "/tmp/${TARBALL}" -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        # The vendored crypto bundles under lib/vendor/ are allowlisted in
        # .gitleaks.toml so they don't trip entropy heuristics. --redact
        # strips secret values from the report so an accidentally-leaked
        # one is not re-printed in CI logs.
        run: gitleaks git --config=.gitleaks.toml --redact --verbose --exit-code=1

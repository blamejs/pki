name: ClusterFuzzLite PR fuzzing

# Coverage-guided fuzzing via jazzer.js + libFuzzer against every
# fuzz/*.fuzz.js harness on every PR touching lib/ or fuzz/.
#
# We invoke jazzer.js directly instead of routing through the
# google/clusterfuzzlite/actions/build_fuzzers wrapper — the wrapper's
# v1 Docker image refuses to fuzz JavaScript projects (it rejects both a
# real sanitizer and an empty/`none` sanitizer for JS), so it is
# structurally broken for JS as of 2026. The .clusterfuzzlite/ directory
# remains the canonical integration spec — what an OSS-Fuzz upstream
# submission mirrors, what OpenSSF Scorecard's Fuzzing check detects, and
# what would re-engage if CFLite ships a JS fix.
#
# Findings: jazzer's -error_exitcode=1 fails the step with the reproducer
# printed inline; the libFuzzer crash artifact lands at crash-* in the
# workspace and uploads on failure.

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'fuzz/**'
      - '.clusterfuzzlite/**'
      - '.github/workflows/cflite_pr.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cflite-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: ClusterFuzzLite ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - asn1-der
          - x509-parse
          - cms-parse
          - ocsp-parse
          - tsp-parse
          - attrcert-parse
          - crmf-parse
          - pkcs12-parse
          - cmp-parse
          - ct-parse
          - smime-parse
          - pkix-ext-parse
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Install jazzer.js
        run: npm ci --prefix fuzz

      - name: Fuzz ${{ matrix.target }}
        env:
          # 60s per target on PR. cflite_batch.yml runs the deeper 1800s
          # schedule that surfaces paths this budget can't reach.
          FUZZ_TIME: '60'
        run: |
          set -e
          harness="fuzz/${{ matrix.target }}.fuzz.js"
          corpus="fuzz/${{ matrix.target }}_seed_corpus"
          echo "::group::jazzer fuzz $harness ($FUZZ_TIME s)"
          # Pass the seed corpus as the first positional arg when present;
          # libFuzzer treats directory args as corpus inputs.
          if [ -d "$corpus" ]; then
            npx --prefix fuzz jazzer "$harness" "$corpus" -- \
              -max_total_time="$FUZZ_TIME" -error_exitcode=1 -timeout=30
          else
            npx --prefix fuzz jazzer "$harness" -- \
              -max_total_time="$FUZZ_TIME" -error_exitcode=1 -timeout=30
          fi
          echo "::endgroup::"

      - name: Upload crash artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            crash-*
            leak-*
            timeout-*
          if-no-files-found: ignore

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "github-actions"

  # devDependencies only (esbuild). The toolkit ships zero npm RUNTIME
  # deps — everything is vendored under lib/vendor/, which Dependabot
  # cannot see; vendored-bundle currency is tracked separately by
  # scripts/check-vendor-currency.js.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "devdeps"

  # Fuzz-harness workspace (jazzer.js). Dev-only, never published; keeps
  # the coverage-guided fuzz toolchain current.
  - package-ecosystem: "npm"
    directory: "/fuzz"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "fuzz"

  # Keeps the digest-pinned oss-fuzz base-builder in
  # .clusterfuzzlite/Dockerfile current — the single tracked source for
  # the fuzz-build toolchain image.
  - package-ecosystem: "docker"
    directory: "/.clusterfuzzlite"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "docker"

# ClusterFuzzLite project config.
#
# Consumed by google/clusterfuzzlite tooling (and an eventual OSS-Fuzz
# upstream submission). The fuzzing that actually runs in CI drives
# jazzer.js directly — see .github/workflows/cflite_*.yml.

language: javascript
fuzzing_engines:
  - libfuzzer
sanitizers:
  - none   # jazzer.js is pure-JS; libFuzzer drives mutation without a native sanitizer
homepage: "https://pkijs.com"
main_repo: "https://github.com/blamejs/pki"
